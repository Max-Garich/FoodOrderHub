services:
  app:
    build: .
    restart: always
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/foodorderhub?schema=public
      - JWT_SECRET=${JWT_SECRET}
      - PORT=3001
      - HOST=0.0.0.0
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=foodorderhub
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d foodorderhub"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
